name: Update snapshot


on:
  schedule:
    # 06:00 UTC = 08:00 CEST; narrowed to Jun/Jul on days 8/9/15/16, then date guard below
    - cron: "0 6 8,9,15,16 6,7 *"
  workflow_dispatch:
    inputs:
      mode:
        description: Pipeline mode (manual runs only)
        type: choice
        options:
          - full
          - update
        default: full

concurrency:
  group: pokedecks-snapshot
  cancel-in-progress: false

permissions:
  contents: write
  actions: read

jobs:
  update-snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 150

    steps:
      - name: Check scheduled date
        id: guard
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "proceed=1" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          TODAY=$(TZ=Europe/Rome date +%Y-%m-%d)
          case "$TODAY" in
            2026-06-09|2026-06-16|2026-07-08|2026-07-15)
              echo "proceed=1" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Skipped: $TODAY is not a 2026 snapshot day"
              echo "proceed=0" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - uses: actions/checkout@v4
        if: steps.guard.outputs.proceed == '1'

      - uses: actions/setup-python@v5
        if: steps.guard.outputs.proceed == '1'
        with:
          python-version: "3.14.3"

      - name: Install Poetry
        if: steps.guard.outputs.proceed == '1'
        run: pipx install poetry

      - name: Install dependencies
        if: steps.guard.outputs.proceed == '1'
        run: poetry install

      - name: Download previous snapshot
        if: steps.guard.outputs.proceed == '1'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p data
          RUN_ID=$(gh run list --repo "${{ github.repository }}" \
            --workflow=update-snapshot.yml --status=success \
            --json databaseId --jq "[.[] | select(.databaseId != ${{ github.run_id }})][0].databaseId" 2>/dev/null || true)
          if [ -n "$RUN_ID" ] && [ "$RUN_ID" != "null" ]; then
            gh run download "$RUN_ID" --repo "${{ github.repository }}" \
              -n pokedecks-snapshot -D data \
              || echo "Download failed — will start without previous snapshot"
          else
            echo "No previous successful run — starting fresh"
          fi

      - name: Choose pipeline mode
        id: mode
        if: steps.guard.outputs.proceed == '1'
        run: |
          if [ ! -f data/pokedecks.db ]; then
            echo "value=full" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.mode }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=update" >> "$GITHUB_OUTPUT"
          fi
          echo "Snapshot date (Europe/Rome): $(TZ=Europe/Rome date +%F)"
          echo "Pipeline mode: $(cat "$GITHUB_OUTPUT" | grep '^value=' | cut -d= -f2-)"

      - name: Run pipeline
        if: steps.guard.outputs.proceed == '1'
        run: |
          poetry run python scripts/pipeline/run.py \
            --mode "${{ steps.mode.outputs.value }}" \
            --date "$(TZ=Europe/Rome date +%F)"

      - name: Upload snapshot
        if: steps.guard.outputs.proceed == '1'
        uses: actions/upload-artifact@v4
        with:
          name: pokedecks-snapshot
          retention-days: 90
          path: |
            data/pokedecks.db
            data/quality/
            data/analysis/

      - name: Publish GitHub Release
        if: steps.guard.outputs.proceed == '1'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="snapshot-$(TZ=Europe/Rome date +%F)"
          ZIP="/tmp/pokedecks-${TAG}.zip"
          zip -r "$ZIP" data/pokedecks.db data/quality data/analysis
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release upload "$TAG" "$ZIP" --repo "${{ github.repository }}" --clobber
          else
            gh release create "$TAG" "$ZIP" --repo "${{ github.repository }}" \
              --title "PokeDecks snapshot ${TAG#snapshot-}" \
              --notes "Automated snapshot from the Update snapshot workflow."
          fi
